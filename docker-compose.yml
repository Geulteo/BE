version: '3.8'

services:
  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: nlp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nlp_db}
      MYSQL_USER: ${MYSQL_USER:-nlpuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nlppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant 벡터 데이터베이스
  qdrant:
    image: qdrant/qdrant
    container_name: nlp-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # FastAPI 백엔드
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-nlpuser}:${MYSQL_PASSWORD:-nlppassword}@mysql:3306/${MYSQL_DATABASE:-nlp_db}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  qdrant_data:
    driver: local
